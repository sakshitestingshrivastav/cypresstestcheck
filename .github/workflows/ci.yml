name: First CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_ENV: devvv

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a simple command
        run: echo "Building the app in $APP_ENV"

  test:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: testttt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a simple command
        run: echo "Running tests in $BUILD_TYPE"
        run: echo "Using secret ${{ secrets.MY_SECRET }}"


