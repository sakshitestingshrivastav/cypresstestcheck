name: Run Postman Collection (Newman)

on:
  push:
    branches: [ main ]

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman@5

      - name: Create results dir
        run: mkdir -p test-results

      - name: Run Postman collection with Newman
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # Example: run collection.json and pass two env vars (replace paths as needed)
          newman run postman/collection.json \
            --env-var "baseUrl=${BASE_URL}" \
            --env-var "apiKey=${API_KEY}" \
            --reporters cli,junit \
            --reporter-junit-export test-results/newman-junit.xml \
            --bail # optional: stop on first failure

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: test-results/
